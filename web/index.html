    html, body {

      height: 100dvh;
      min-height: 100dvh;

    }

    /* Prevent zoom on input focus */

      font-size: 16px !important;

    /* Flutter app container should fill exactly the viewport */
    flt-glass-pane, flutter-view {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100dvh !important;
      max-height: 100dvh !important;

    /* Hide Google Maps UI controls that get accidentally clicked */

    }

    /* Hide the entire control container at bottom */

      display: none !important;

    /* Keep zoom controls visible but hide other gmnoprint elements */

    }

  <!-- Prevent iOS Safari zoom gestures -->
  <script>
    // Prevent pinch-to-zoom
    document.addEventListener('touchmove', function(event) {
      if (event.scale !== 1) {
        event.preventDefault();
      }
    }, { passive: false });

    // Prevent double-tap zoom
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    // Prevent gesturestart (iOS specific)
    document.addEventListener('gesturestart', function(event) {
      event.preventDefault();
    });

    document.addEventListener('gesturechange', function(event) {
      event.preventDefault();
    });

    document.addEventListener('gestureend', function(event) {
      event.preventDefault();
    });

    // Fix Android keyboard viewport gap issue
    let lastHeight = window.innerHeight;
    window.addEventListener('resize', function() {
      const currentHeight = window.innerHeight;

      // If height increased significantly (keyboard closed), force viewport reset
      if (currentHeight > lastHeight + 100) {
        // Scroll to top to reset viewport
        window.scrollTo(0, 0);

        // Force layout recalculation
        document.body.style.height = currentHeight + 'px';
        setTimeout(() => {
          document.body.style.height = '100%';
        }, 100);
      }

      lastHeight = currentHeight;
    });

    // Use Visual Viewport API if available (modern browsers)
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        // When keyboard closes, reset any offset
        if (window.visualViewport.height > window.innerHeight * 0.8) {
          window.scrollTo(0, 0);
        }
      });
    }
  </script>

  <!-- Register Firebase Messaging Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then(function(registration) {
            console.log('[SW] Firebase Messaging SW registered with scope:', registration.scope);

            // Check for updates periodically
            setInterval(function() {
              registration.update();
            }, 60000); // Check every minute
          })
          .catch(function(error) {
            console.error('[SW] Service Worker registration failed:', error);
          });
      });
    }
  </script>

  <!-- PWA White Screen Detection Fix - iOS Enhanced -->
  <script>
    (function() {
      'use strict';

      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
      const isStandalone = window.navigator.standalone === true ||
                          window.matchMedia('(display-mode: standalone)').matches;
      const isPWA = isStandalone;

      console.log('[PWA Fix] Starting white screen detection...', {
        isIOS,
        isPWA,
        userAgent: navigator.userAgent.substring(0, 50)
      });

      // Add global cache clear function for manual recovery
      window.clearAllCachesAndReload = async function() {
        console.log('[Cache Clear] Starting comprehensive cache clear...');

        try {
          // 1. Clear all caches
          if ('caches' in window) {
            const cacheNames = await caches.keys();
            console.log('[Cache Clear] Found', cacheNames.length, 'caches');
            for (const name of cacheNames) {
              console.log('[Cache Clear] Deleting cache:', name);
              await caches.delete(name);
            }
          }

          // 2. Unregister all service workers
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            console.log('[Cache Clear] Found', registrations.length, 'service workers');
            for (const registration of registrations) {
              console.log('[Cache Clear] Unregistering SW');
              await registration.unregister();
            }
          }

          // 3. Clear storage
          sessionStorage.clear();
          localStorage.clear();

          console.log('[Cache Clear] All caches cleared, reloading...');

          // 4. Hard reload
          window.location.href = window.location.href + '?nocache=' + Date.now();
        } catch (error) {
          console.error('[Cache Clear] Error:', error);
          window.location.reload(true);
        }
      };

      console.log('[PWA Fix] Global cache clear function available: window.clearAllCachesAndReload()');

      // Function to check for Flutter content
      function checkForFlutter() {
        return document.querySelector('flt-glass-pane') ||
               document.querySelector('flutter-view') ||
               document.querySelector('canvas') ||
               document.querySelector('flt-renderer') ||
               document.querySelector('flt-semantics') ||
               document.querySelector('flt-scene-host');
      }

      // iOS needs faster timeout, Android can wait longer
      const timeout = isIOS ? 8000 : 12000;
      let checkInterval = null;
      let hasLoaded = false;

      // Continuous checking every 2 seconds (more aggressive for iOS)
      if (isIOS && isPWA) {
        checkInterval = setInterval(() => {
          if (hasLoaded) {
            clearInterval(checkInterval);
            return;
          }

          if (checkForFlutter()) {
            console.log('[PWA Fix - iOS] Flutter detected via interval check');
            hasLoaded = true;
            clearInterval(checkInterval);
          }
        }, 2000);
      }

      // Main timeout check
      let appLoadTimeout = setTimeout(() => {
        console.warn('[PWA Fix] App took longer than expected to load, checking...');
        const hasFlutterContent = checkForFlutter();

        if (!hasFlutterContent) {
          console.error('[PWA Fix] NO FLUTTER CONTENT DETECTED - RELOADING');

          // Prevent infinite reload loop
          const reloadCount = parseInt(sessionStorage.getItem('pwa_reload_count') || '0');
          const lastReloadTime = parseInt(sessionStorage.getItem('pwa_last_reload') || '0');
          const now = Date.now();

          // Reset counter if last reload was more than 2 minutes ago
          if (now - lastReloadTime > 120000) {
            sessionStorage.setItem('pwa_reload_count', '0');
          }

          // iOS gets 3 tries instead of 2 (more prone to issues)
          const maxReloads = isIOS ? 3 : 2;

          if (reloadCount < maxReloads) {
            sessionStorage.setItem('pwa_reload_count', (reloadCount + 1).toString());
            sessionStorage.setItem('pwa_last_reload', now.toString());
            console.log(`[PWA Fix] Reload attempt ${reloadCount + 1}/${maxReloads} - CLEARING CACHES FIRST`);

            // Clear caches before reload to avoid loading broken cached version
            if ('caches' in window) {
              caches.keys().then(function(cacheNames) {
                return Promise.all(
                  cacheNames.map(function(name) {
                    console.log('[PWA Fix] Deleting cache:', name);
                    return caches.delete(name);
                  })
                );
              }).then(function() {
                console.log('[PWA Fix] Caches cleared, reloading...');
                // Hard reload with cache bust
                window.location.href = window.location.href.split('?')[0] + '?t=' + Date.now();
              }).catch(function(error) {
                console.error('[PWA Fix] Cache clear failed:', error);
                window.location.href = window.location.href.split('?')[0] + '?t=' + Date.now();
              });
            } else {
              // No cache API available, just reload with cache bust
              window.location.href = window.location.href.split('?')[0] + '?t=' + Date.now();
            }
          } else {
            console.error('[PWA Fix] Too many reload attempts, showing error');
            document.body.innerHTML = `
              <div style="display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; font-family: Arial, sans-serif; padding: 20px; text-align: center;">
                <div style="font-size: 48px; margin-bottom: 20px;">[WARN]</div>
                <h1 style="color: #d32f2f; margin: 10px 0;">Failed to Load</h1>
                <p style="color: #666; margin: 10px 0 20px 0;">The app failed to start after multiple attempts.</p>
                <p style="color: #999; font-size: 12px; margin: 10px 0;">This may be caused by cached data. Try clearing the cache below.</p>
                ${isIOS ? '<p style="color: #666; font-size: 14px; margin: 10px 0;">iOS detected - If clearing cache doesn\'t work, force close and reopen</p>' : ''}
                <button onclick="window.clearAllCachesAndReload()" style="margin: 10px; padding: 12px 24px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Clear All Caches & Reload</button>
                <button onclick="alert('${isIOS ? '1. Swipe up from bottom to see all apps\\n2. Find Lighthouse and swipe up to close\\n3. Wait 5 seconds\\n4. Tap the app icon to reopen' : '1. Open Chrome menu (3 dots)\\n2. Go to Settings > Apps\\n3. Find Lighthouse\\n4. Tap Uninstall\\n5. Visit the site again to reinstall'}');" style="margin: 10px; padding: 12px 24px; background: #666; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">${isIOS ? 'Force Close Help' : 'Reinstall Help'}</button>
                <div style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #666;">
                  <div><strong>For developers:</strong></div>
                  <div>Open browser console and run: <code style="background: #fff; padding: 2px 6px;">window.clearAllCachesAndReload()</code></div>
                </div>
              </div>
            `;
          }
        } else {
          console.log('[PWA Fix] Flutter content detected, app is loading...');
        }
      }, timeout);

      // Clear timeout once Flutter loads successfully
      window.addEventListener('flutter-first-frame', () => {
        hasLoaded = true;
        clearTimeout(appLoadTimeout);
        if (checkInterval) clearInterval(checkInterval);
        sessionStorage.removeItem('pwa_reload_count');
        sessionStorage.removeItem('pwa_last_reload');
        console.log('[PWA Fix]  Flutter loaded successfully');
      });

      // Also listen for DOMContentLoaded
      document.addEventListener('DOMContentLoaded', () => {
        console.log('[PWA Fix] DOMContentLoaded fired');
        setTimeout(() => {
          if (checkForFlutter()) {
            hasLoaded = true;
            clearTimeout(appLoadTimeout);
            if (checkInterval) clearInterval(checkInterval);
            console.log('[PWA Fix]  Flutter detected after DOMContentLoaded');
          }
        }, 1000);
      });

      console.log('[PWA Fix] Detection active  (timeout: ' + timeout + 'ms)');
    })();
  </script>

  <!-- LiveKit Media Track Cleanup Helper for PWA -->
  <script>
    // Global function to force stop all active media tracks
    window.forceStopAllMediaTracks = function() {
      console.log('[MediaCleanup] Force stopping all active media tracks');

      try {
        // Stop all MediaStreamTrack instances
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          console.log('[MediaCleanup] Attempting to stop all tracks...');

          // Get all video elements and stop their tracks
          document.querySelectorAll('video').forEach(function(video) {
            if (video.srcObject) {
              console.log('[MediaCleanup] Found video element with srcObject');
              video.srcObject.getTracks().forEach(function(track) {
                console.log('[MediaCleanup] Stopping track:', track.kind, track.label);
                track.stop();
              });
              video.srcObject = null;
            }
          });

          // Get all audio elements and stop their tracks
          document.querySelectorAll('audio').forEach(function(audio) {
            if (audio.srcObject) {
              console.log('[MediaCleanup] Found audio element with srcObject');
              audio.srcObject.getTracks().forEach(function(track) {
                console.log('[MediaCleanup] Stopping track:', track.kind, track.label);
                track.stop();
              });
              audio.srcObject = null;
            }
          });

          console.log('[MediaCleanup]  All media tracks stopped');
          return true;
        }
      } catch (e) {
        console.error('[MediaCleanup] Error stopping media tracks:', e);
        return false;
      }
    };

    console.log('[MediaCleanup] Helper loaded - window.forceStopAllMediaTracks() available');
  </script>

  <!-- Android PWA Keyboard Fix - Simplified -->
  <script>
    (function() {
      console.log('[Android Keyboard Fix] Initializing...');

      // Detect if we're on Android
      const isAndroid = /Android/i.test(navigator.userAgent);
      if (!isAndroid) {
        console.log('[Android Keyboard Fix] Not Android, skipping');
        return;
      }

      console.log('[Android Keyboard Fix] Android detected, applying fixes');

      let isKeyboardOpen = false;

      // Simple reset function - just scroll and force layout recalc
      function resetViewport() {
        console.log('[Android Keyboard Fix] Resetting viewport');

        // Force scroll to top (multiple times for reliability)
        for (let i = 0; i < 3; i++) {
          setTimeout(function() {
            window.scrollTo(0, 0);
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;

            // Force layout recalculation
            document.body.style.height = '100vh';
            void document.body.offsetHeight;
            document.body.style.height = '';

            console.log('[Android Keyboard Fix] Reset iteration', i + 1);
          }, i * 100);
        }
      }

      // Use Visual Viewport API for keyboard detection
      if ('visualViewport' in window) {
        let lastHeight = window.visualViewport.height;

        window.visualViewport.addEventListener('resize', function() {
          const currentHeight = window.visualViewport.height;
          const heightDiff = lastHeight - currentHeight;
          const screenHeight = window.screen.height;

          console.log('[Android Keyboard Fix] Viewport resize:', {
            lastHeight,
            currentHeight,
            diff: heightDiff,
            percentageOfScreen: (currentHeight / screenHeight * 100).toFixed(1) + '%'
          });

          // Keyboard is opening
          if (heightDiff > 150 && !isKeyboardOpen) {
            isKeyboardOpen = true;
            console.log('[Android Keyboard Fix] 🎹 Keyboard OPENED');

            // Just prevent scroll on open
            window.scrollTo(0, 0);
          }
          // Keyboard is closing
          else if ((heightDiff < -100 || currentHeight > screenHeight * 0.8) && isKeyboardOpen) {
            isKeyboardOpen = false;
            console.log('[Android Keyboard Fix] 🎹 Keyboard CLOSED - resetting');

            // Reset viewport when keyboard closes
            resetViewport();
          }

          lastHeight = currentHeight;
        });
      }

      // Reset on input blur
      document.addEventListener('blur', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
          console.log('[Android Keyboard Fix] Input blur, resetting in 200ms');
          setTimeout(resetViewport, 200);
          setTimeout(resetViewport, 400);
        }
      }, true);

      console.log('[Android Keyboard Fix] Initialization complete ');
    })();
  </script>
