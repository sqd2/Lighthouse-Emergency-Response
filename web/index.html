<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Lighthouse - Emergency Response System">

  <!-- Prevent iOS Safari zoom -->
  <style>
    * {
      touch-action: pan-x pan-y;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    input, textarea {
      -webkit-user-select: text;
      touch-action: manipulation;
    }
    body {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
  </style>

  <!-- Content Security Policy - permissive for Flutter Web & Google Maps -->
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">

  <!-- Permissions -->
  <meta http-equiv="Permissions-Policy" content="geolocation=(self), camera=(self), microphone=(self)">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Lighthouse">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Lighthouse - Emergency Response</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Maps JavaScript API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCvvz3UmQXQR9PzRUeYlNu2wJqpxG8FvuQ"></script>

  <!-- Firebase SDKs for JavaScript -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>
  <script>
    // Initialize Firebase with Firebase-generated API key
    const firebaseConfig = {
      apiKey: "AIzaSyBOawlsvCMxrDlC8fV2oUnja_fd3bXd4gY",
      authDomain: "lighthouse-2498c.firebaseapp.com",
      projectId: "lighthouse-2498c",
      storageBucket: "lighthouse-2498c.firebasestorage.app",
      messagingSenderId: "572669546401",
      appId: "1:572669546401:web:7830430c557c6edb1845e0",
      measurementId: "G-NET6W8XQD4"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>

  <!-- Debug Console for iPhone Testing -->
  <script src="debug-console.js"></script>

  <!-- Prevent iOS Safari zoom gestures -->
  <script>
    // Prevent pinch-to-zoom
    document.addEventListener('touchmove', function(event) {
      if (event.scale !== 1) {
        event.preventDefault();
      }
    }, { passive: false });

    // Prevent double-tap zoom
    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    // Prevent gesturestart (iOS specific)
    document.addEventListener('gesturestart', function(event) {
      event.preventDefault();
    });

    document.addEventListener('gesturechange', function(event) {
      event.preventDefault();
    });

    document.addEventListener('gestureend', function(event) {
      event.preventDefault();
    });
  </script>

  <!-- Register Firebase Messaging Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/firebase-messaging-sw.js')
          .then(function(registration) {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(function(error) {
            console.error('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
